services:
  rethinkdb:
    build:
      context: ../..
      dockerfile: backend/docker/rethinkdb/Dockerfile
    image: vekan-rethinkdb:2.4.4-local
    restart: unless-stopped
    ports:
      - "127.0.0.1:39015:28015"
      - "127.0.0.1:39080:8080"
    volumes:
      - vekan-rethinkdb-data:/data

  app:
    build:
      context: ../..
      dockerfile: deploy/oracle/Dockerfile
    image: vekan-app:${APP_IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - rethinkdb
    environment:
      NODE_ENV: production
      PORT: 8000
      RETHINKDB_SERVERS: rethinkdb:28015
      RETHINKDB_DB: ${RETHINKDB_DB:-vekan}
      RETHINKDB_USER: ${RETHINKDB_USER:-admin}
      RETHINKDB_PASSWORD: ${RETHINKDB_PASSWORD:-}
      RETHINKDB_TIMEOUT: ${RETHINKDB_TIMEOUT:-20}
      RETHINKDB_INIT_MAX_ATTEMPTS: ${RETHINKDB_INIT_MAX_ATTEMPTS:-30}
      RETHINKDB_INIT_RETRY_MS: ${RETHINKDB_INIT_RETRY_MS:-1000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?APP_DOMAIN is required}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - vekan-caddy-data:/data
      - vekan-caddy-config:/config

volumes:
  vekan-rethinkdb-data:
    name: vekan-rethinkdb-data
  vekan-caddy-data:
    name: vekan-caddy-data
  vekan-caddy-config:
    name: vekan-caddy-config
